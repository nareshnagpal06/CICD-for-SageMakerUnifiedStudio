name: SMUS Direct Deploy (Reusable)

# Reusable deploy (and optional test) for a single manifest target. Runs in the
# GitHub Environment named by `environment_name`, assuming the OIDC role from
# the AWS_ROLE_ARN secret and the region from vars.DOMAIN_REGION.

on:
  workflow_call:
    inputs:
      manifest_path:
        description: 'Path to the manifest file'
        required: false
        type: string
        default: 'manifest.yaml'
      target:
        description: 'Manifest target/stage to deploy (e.g. dev, test, prod)'
        required: false
        type: string
        default: 'test'
      environment_name:
        description: 'GitHub Environment to run in (provides AWS_ROLE_ARN + DOMAIN_REGION)'
        required: false
        type: string
        default: 'test-aws-account'
      python_version:
        description: 'Python version'
        required: false
        type: string
        default: '3.12'
      skip_tests:
        description: 'Skip the test job'
        required: false
        type: boolean
        default: false
      setup_mlflow:
        description: 'Provision/verify the MLflow tracking server before deploy'
        required: false
        type: boolean
        default: false
    secrets:
      AWS_ROLE_ARN:
        description: 'OIDC role ARN to assume'
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy (${{ inputs.target }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install SMUS CI/CD CLI
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.DOMAIN_REGION }}
          role-session-name: smus-deploy-${{ inputs.target }}

      - name: Get AWS Account ID
        id: aws-account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account-id=$ACCOUNT_ID" >> "$GITHUB_OUTPUT"

      - name: Setup MLflow tracking server
        id: mlflow-setup
        if: ${{ inputs.setup_mlflow }}
        run: |
          REGION="${{ vars.DOMAIN_REGION }}"
          ACCOUNT_ID="${{ steps.aws-account.outputs.account-id }}"
          STACK_NAME="smus-shared-resources"
          TRACKING_SERVER_NAME="smus-integration-mlflow-${REGION}"
          SERVER_EXISTS=$(aws sagemaker list-mlflow-tracking-servers \
            --region "$REGION" \
            --query "TrackingServerSummaries[?TrackingServerName=='$TRACKING_SERVER_NAME'].TrackingServerName" \
            --output text)
          if [ -n "$SERVER_EXISTS" ]; then
            echo "MLflow tracking server '$TRACKING_SERVER_NAME' already exists"
          else
            aws cloudformation deploy \
              --template-file tests/scripts/setup/idc-based-domains/5-testing-infrastructure/testing-infrastructure/shared-resources-template.yaml \
              --stack-name "$STACK_NAME" \
              --parameter-overrides \
                S3BucketName="smus-mlflow-artifacts-${ACCOUNT_ID}-${REGION}" \
                TrackingServerName="$TRACKING_SERVER_NAME" \
                TrackingServerSize="Small" \
              --capabilities CAPABILITY_NAMED_IAM \
              --region "$REGION"
          fi

      - name: Deploy
        env:
          DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          DEV_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          TEST_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          PROD_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          MLFLOW_TRACKING_SERVER_NAME: ${{ inputs.setup_mlflow && format('smus-integration-mlflow-{0}', vars.DOMAIN_REGION) || '' }}
          MLFLOW_ARTIFACT_LOCATION: s3://amazon-sagemaker-${{ steps.aws-account.outputs.account-id }}-${{ vars.DOMAIN_REGION }}-${{ vars.PROJECT_ID }}/shared/ml/mlflow-artifacts
          STS_REGION: ${{ vars.DOMAIN_REGION }}
          STS_ACCOUNT_ID: ${{ steps.aws-account.outputs.account-id }}
          AWS_ACCOUNT_ID: ${{ steps.aws-account.outputs.account-id }}
        run: |
          aws-smus-cicd-cli deploy \
            --manifest "${{ inputs.manifest_path }}" \
            --targets "${{ inputs.target }}"

      - name: Download workflow output notebooks
        if: always()
        continue-on-error: true
        env:
          MANIFEST_PATH: ${{ inputs.manifest_path }}
          TARGET: ${{ inputs.target }}
          REGION: ${{ vars.DOMAIN_REGION }}
        run: |
          python3 << 'EOF'
          import yaml, subprocess, sys, os
          manifest_path = os.environ["MANIFEST_PATH"]
          target = os.environ["TARGET"]
          region = os.environ["REGION"]
          try:
              with open(manifest_path) as f:
                  manifest = yaml.safe_load(f.read())
              app_name = manifest.get('applicationName', '')
              target_config = manifest.get('stages', {}).get(target, {})
              project_name = target_config.get('project', {}).get('name', '')
              workflows = manifest.get('content', {}).get('workflows', [])
              if not workflows or not project_name:
                  print("No workflows or project name found in manifest")
                  sys.exit(0)
              for workflow in workflows:
                  workflow_name = workflow.get('workflowName', '')
                  if workflow_name:
                      full_name = f"{app_name}_{project_name}_{workflow_name}"
                      print(f"Downloading outputs for: {full_name}")
                      subprocess.run([
                          'python3', 'tests/scripts/download_workflow_outputs_from_xcom.py',
                          full_name, '--region', region,
                          '--output-dir', 'tests/test-outputs/notebooks'
                      ])
          except Exception as e:
              print(f"Error downloading notebooks: {e}")
          EOF

      - name: Upload workflow output notebooks
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-output-notebooks-${{ github.run_id }}
          path: tests/test-outputs/notebooks/**
          if-no-files-found: ignore
          retention-days: 7

  test:
    name: Run Tests (${{ inputs.target }})
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ !inputs.skip_tests }}
    environment: ${{ inputs.environment_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install SMUS CI/CD CLI
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.DOMAIN_REGION }}
          role-session-name: smus-test-${{ inputs.target }}

      - name: Get AWS Account ID
        id: aws-account-test
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account-id=$ACCOUNT_ID" >> "$GITHUB_OUTPUT"

      - name: Test
        env:
          DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          DEV_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          TEST_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          PROD_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          MLFLOW_TRACKING_SERVER_NAME: ${{ inputs.setup_mlflow && format('smus-integration-mlflow-{0}', vars.DOMAIN_REGION) || '' }}
          MLFLOW_ARTIFACT_LOCATION: s3://amazon-sagemaker-${{ steps.aws-account-test.outputs.account-id }}-${{ vars.DOMAIN_REGION }}-${{ vars.PROJECT_ID }}/shared/ml/mlflow-artifacts
          STS_REGION: ${{ vars.DOMAIN_REGION }}
          STS_ACCOUNT_ID: ${{ steps.aws-account-test.outputs.account-id }}
          AWS_ACCOUNT_ID: ${{ steps.aws-account-test.outputs.account-id }}
        run: |
          aws-smus-cicd-cli test \
            --manifest "${{ inputs.manifest_path }}" \
            --targets "${{ inputs.target }}"
