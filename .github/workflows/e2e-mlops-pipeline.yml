name: E2E Deploy MLOps Pipeline

on:
  push:
    branches:
      - main
      - test
    paths:
      - 'examples/end-to-end-data-ml-pipeline/examples/mlops-pipeline/**'
      - 'src/**'
      - '.github/workflows/smus-direct-deploy.yml'
      - '.github/workflows/e2e-mlops-pipeline.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment to deploy"
        required: true
        default: "dev"
        type: choice
        options: [dev, test, prod]

permissions:
  id-token: write
  contents: read

jobs:
  # --------------------------------------------------------------------------
  # Job 1: Provision MLOps infra (EventBridge + Lambda deploy trigger)
  # --------------------------------------------------------------------------
  setup-infra:
    name: Setup MLOps Infrastructure
    runs-on: ubuntu-latest
    environment: test-aws-account
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_TEST }}
          aws-region: ${{ vars.DOMAIN_REGION }}
          role-session-name: smus-mlops-infra-session

      - name: Get AWS Account ID
        id: aws-account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account-id=$ACCOUNT_ID" >> $GITHUB_OUTPUT
          echo "✓ AWS Account ID: $ACCOUNT_ID"

      - name: Provision MLOps infra
        env:
          GITHUB_REPO: ${{ github.repository }}
        run: |
          REGION="${{ vars.DOMAIN_REGION }}"
          ACCOUNT_ID="${{ steps.aws-account.outputs.account-id }}"
          PROJECT_NAME="bank-mktg-${{ inputs.environment || 'dev' }}"

          echo "🚧 Provisioning MLOps infra for ${{ inputs.environment || 'dev' }}"
          bash examples/end-to-end-data-ml-pipeline/scripts/setup-mlops-infra.sh \
            "${{ inputs.environment || 'dev' }}" \
            "$ACCOUNT_ID" \
            "$REGION" \
            "$PROJECT_NAME"

  # --------------------------------------------------------------------------
  # Job 2: Deploy using smus-direct-deploy (single-hop OIDC auth)
  # --------------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: [setup-infra]
    uses: ./.github/workflows/smus-direct-deploy.yml
    with:
      manifest_path: 'examples/end-to-end-data-ml-pipeline/examples/mlops-pipeline/manifest.yaml'
      test_target: ${{ inputs.environment || 'dev' }}
      setup_mlflow: true
      skip_tests: true
    secrets:
      AWS_ROLE_ARN_TEST: ${{ secrets.AWS_ROLE_ARN_TEST }}

  # --------------------------------------------------------------------------
  # Job 3: Upload the training source bundle (sourcedir.tar.gz) to S3
  # --------------------------------------------------------------------------
  # SageMaker downloads `sourcedir.tar.gz` from the project shared S3 location
  # at training time (see `sagemaker_submit_directory` in
  # workflows/training_pipeline.yaml). The bundle is git-ignored and built at
  # deploy time, and `smus-direct-deploy.yml` checks out its own tree (without
  # the bundle), so the bundle must be pushed to S3 here.
  #
  # Runs AFTER `deploy` so the deploy's `src/` sync cannot clobber the bundle.
  # --------------------------------------------------------------------------
  upload-sourcedir:
    name: Upload Training Source Bundle to S3
    needs: [deploy]
    runs-on: ubuntu-latest
    environment: test-aws-account
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install SMUS CI/CD CLI
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build sourcedir.tar.gz
        run: |
          echo "🔧 Building MLOps training source bundle..."
          bash examples/end-to-end-data-ml-pipeline/scripts/build-mlops-sourcedir.sh

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_TEST }}
          aws-region: ${{ vars.DOMAIN_REGION }}
          role-session-name: smus-mlops-sourcedir-upload

      - name: Get AWS Account ID
        id: aws-account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account-id=$ACCOUNT_ID" >> $GITHUB_OUTPUT
          echo "✓ AWS Account ID: $ACCOUNT_ID"

      - name: Resolve shared S3 location and upload bundle
        env:
          DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          DEV_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          TEST_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          PROD_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          AWS_ACCOUNT_ID: ${{ steps.aws-account.outputs.account-id }}
        run: |
          set -euo pipefail
          MANIFEST="examples/end-to-end-data-ml-pipeline/examples/mlops-pipeline/manifest.yaml"
          TARGET="${{ inputs.environment || 'dev' }}"
          SRC="examples/end-to-end-data-ml-pipeline/examples/mlops-pipeline/src/sourcedir.tar.gz"

          # Resolve the project's default.s3_shared URI from the CLI (same source
          # of truth the training DAG uses for sagemaker_submit_directory), so we
          # never hardcode the bucket name or depend on an external PROJECT_ID var.
          echo "🔍 Resolving default.s3_shared URI for target '$TARGET'..."
          aws-smus-cicd-cli describe \
            --manifest "$MANIFEST" \
            --targets "$TARGET" \
            --connect \
            --output JSON > describe.json

          S3_URI=$(python3 - "$TARGET" <<'PY'
          import json, sys
          target = sys.argv[1]
          text = open("describe.json").read()
          # Tolerate any non-JSON lines the CLI may print before the JSON object.
          start, end = text.find("{"), text.rfind("}")
          if start == -1 or end == -1:
              sys.stderr.write("No JSON object found in describe output\n")
              sys.exit(1)
          data = json.loads(text[start:end + 1])
          conns = data.get("targets", {}).get(target, {}).get("connections", {})
          uri = conns.get("default.s3_shared", {}).get("s3Uri", "")
          if not uri:
              sys.stderr.write("Could not resolve default.s3_shared s3Uri from describe output\n")
              sys.exit(1)
          print(uri)
          PY
          )

          # Mirror the DAG's sagemaker_submit_directory resolution:
          #   {default.s3_shared.s3Uri}bank-mktg/mlops_pipeline/src/sourcedir.tar.gz
          DEST="${S3_URI%/}/bank-mktg/mlops_pipeline/src/sourcedir.tar.gz"

          echo "📤 Uploading $SRC -> $DEST"
          aws s3 cp "$SRC" "$DEST"

          echo "🔎 Verifying upload:"
          aws s3 ls "$DEST"
