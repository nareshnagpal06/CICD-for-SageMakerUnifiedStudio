name: E2E Deploy MLOps Pipeline

on:
  push:
    branches:
      - main
      - test
    paths:
      - 'examples/end-to-end-data-ml-pipeline/examples/mlops-pipeline/**'
      - 'src/**'
      - '.github/workflows/smus-direct-deploy.yml'
      - '.github/workflows/e2e-mlops-pipeline.yml'
  workflow_dispatch:
    inputs:
      setup_infra:
        description: "Provision MLOps infra (EventBridge + Lambda deploy trigger) — runs once in dev"
        required: false
        default: true
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  # Provision the deploy trigger (EventBridge + Lambda) once, in dev.
  setup-infra:
    name: Setup ML Training Pipeline Infrastructure (dev)
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.setup_infra }}
    runs-on: ubuntu-latest
    environment: dev-aws-account
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ vars.DOMAIN_REGION }}
          role-session-name: smus-mlops-infra-session

      - name: Get AWS Account ID
        id: aws-account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account-id=$ACCOUNT_ID" >> "$GITHUB_OUTPUT"

      - name: Provision MLOps infra
        run: |
          bash examples/end-to-end-data-ml-pipeline/scripts/setup-mlops-infra.sh \
            "dev" \
            "${{ steps.aws-account.outputs.account-id }}" \
            "${{ vars.DOMAIN_REGION }}" \
            "bank-mktg-dev"

  # Deploy dev, then build + upload the training source bundle to the dev
  # project's shared S3 (after deploy, so the deploy's src/ sync cannot clobber
  # sourcedir.tar.gz). test -> prod follow via the reusable.
  deploy:
    name: Deploy MLOps Pipeline (dev)
    needs: [setup-infra]
    if: ${{ always() && needs.setup-infra.result != 'failure' && needs.setup-infra.result != 'cancelled' }}
    runs-on: ubuntu-latest
    environment: dev-aws-account
    env:
      DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
      DEV_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
      TEST_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
      PROD_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install SMUS CI/CD CLI
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ vars.DOMAIN_REGION }}
          role-session-name: smus-mlops-dev-deploy

      - name: Get AWS Account ID
        id: aws-account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account-id=$ACCOUNT_ID" >> "$GITHUB_OUTPUT"

      - name: Deploy dev
        env:
          AWS_ACCOUNT_ID: ${{ steps.aws-account.outputs.account-id }}
        run: |
          aws-smus-cicd-cli deploy \
            --manifest examples/end-to-end-data-ml-pipeline/examples/mlops-pipeline/manifest.yaml \
            --targets dev

      - name: Build + upload sourcedir.tar.gz
        env:
          AWS_ACCOUNT_ID: ${{ steps.aws-account.outputs.account-id }}
        run: |
          set -euo pipefail
          bash examples/end-to-end-data-ml-pipeline/scripts/build-mlops-sourcedir.sh
          MANIFEST="examples/end-to-end-data-ml-pipeline/examples/mlops-pipeline/manifest.yaml"
          SRC="examples/end-to-end-data-ml-pipeline/examples/mlops-pipeline/src/sourcedir.tar.gz"

          aws-smus-cicd-cli describe --manifest "$MANIFEST" --targets dev --connect --output JSON > describe.json

          S3_URI=$(python3 - <<'PY'
          import json, sys
          text = open("describe.json").read()
          start, end = text.find("{"), text.rfind("}")
          if start == -1 or end == -1:
              sys.exit("No JSON object found in describe output")
          data = json.loads(text[start:end + 1])
          uri = data.get("targets", {}).get("dev", {}).get("connections", {}).get("default.s3_shared", {}).get("s3Uri", "")
          if not uri:
              sys.exit("Could not resolve default.s3_shared s3Uri")
          print(uri)
          PY
          )

          DEST="${S3_URI%/}/bank-mktg/mlops_pipeline/src/sourcedir.tar.gz"
          aws s3 cp "$SRC" "$DEST"
          aws s3 ls "$DEST"

  deploy-test:
    name: Deploy MLOps Pipeline (test)
    needs: [deploy]
    uses: ./.github/workflows/smus-direct-deploy.yml
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN_DEV }}
    with:
      manifest_path: 'examples/end-to-end-data-ml-pipeline/examples/mlops-pipeline/manifest.yaml'
      test_target: 'test'
      environment_name: 'dev-aws-account'
      skip_tests: true

  deploy-prod:
    name: Deploy MLOps Pipeline (prod)
    needs: [deploy-test]
    uses: ./.github/workflows/smus-direct-deploy.yml
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN_DEV }}
    with:
      manifest_path: 'examples/end-to-end-data-ml-pipeline/examples/mlops-pipeline/manifest.yaml'
      test_target: 'prod'
      environment_name: 'dev-aws-account'
      skip_tests: true
