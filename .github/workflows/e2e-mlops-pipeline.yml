name: E2E Deploy MLOps Pipeline

on:
  push:
    branches:
      - main
      - test
    paths:
      - 'examples/end-to-end-data-ml-pipeline/examples/mlops-pipeline/**'
      - 'src/**'
      - '.github/workflows/smus-direct-deploy.yml'
      - '.github/workflows/e2e-mlops-pipeline.yml'
  workflow_dispatch:
    inputs:
      # NOTE: dev/test/prod are logical SMUS stages (separate projects), NOT
      # separate AWS accounts. Every stage deploys into the same dev AWS
      # account using AWS_ROLE_ARN_DEV + the dev-aws-account environment (the
      # dev role is a member of all three projects). This does not deploy to
      # distinct test/prod accounts. See the `deploy` job's matrix comment.
      stages:
        description: "Stage(s) to deploy ('all' = dev -> test -> prod, all in the dev AWS account)"
        required: true
        default: "all"
        type: choice
        options: [all, dev, test, prod]
      setup_infra:
        description: "Provision MLOps infra (EventBridge + Lambda deploy trigger) — runs once in dev"
        required: false
        default: true
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  # Provision the deploy trigger (EventBridge + Lambda) once, in dev.
  setup-infra:
    name: Setup ML Training Pipeline Infrastructure (dev)
    if: ${{ (github.event_name != 'workflow_dispatch' || inputs.setup_infra) && (inputs.stages == '' || inputs.stages == 'all' || inputs.stages == 'dev') }}
    runs-on: ubuntu-latest
    environment: dev-aws-account
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ vars.DOMAIN_REGION }}
          role-session-name: smus-mlops-infra-session

      - name: Get AWS Account ID
        id: aws-account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account-id=$ACCOUNT_ID" >> "$GITHUB_OUTPUT"

      - name: Provision MLOps infra
        env:
          # Dispatch model-approved events back to whichever repo runs this
          # workflow (portable across forks). Without this the script falls
          # back to its hardcoded default and events go to the wrong repo.
          GITHUB_REPO: ${{ github.repository }}
          # Pass GitHub expressions through env (never inline ${{ }} into the
          # run: body) so untrusted values can't be interpreted as shell.
          ACCOUNT_ID: ${{ steps.aws-account.outputs.account-id }}
          REGION: ${{ vars.DOMAIN_REGION }}
        run: |
          bash examples/end-to-end-data-ml-pipeline/scripts/setup-mlops-infra.sh \
            "dev" \
            "$ACCOUNT_ID" \
            "$REGION" \
            "bank-mktg-dev"

  # Deploy dev -> test -> prod sequentially (max-parallel: 1) via the shared
  # reusable. All stages deploy into the single dev AWS account using
  # AWS_ROLE_ARN_DEV + the dev-aws-account environment (the dev role is a member
  # of all three projects), so the role and environment are set once at the job
  # level below rather than per matrix entry. The matrix only selects which
  # stages run: the `stages` input picks a single stage, and anything else
  # (including a `push` event, where the input is empty) runs dev -> test -> prod.
  deploy:
    name: Deploy MLOps Pipeline (${{ matrix.stage }})
    needs: [setup-infra]
    if: ${{ always() && needs.setup-infra.result != 'failure' && needs.setup-infra.result != 'cancelled' }}
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        stage: >-
          ${{ fromJSON(
          inputs.stages == 'dev' && '["dev"]'
          || inputs.stages == 'test' && '["test"]'
          || inputs.stages == 'prod' && '["prod"]'
          || '["dev","test","prod"]'
          ) }}
    uses: ./.github/workflows/smus-direct-deploy.yml
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN_DEV }}
    with:
      manifest_path: 'examples/end-to-end-data-ml-pipeline/examples/mlops-pipeline/manifest.yaml'
      target: ${{ matrix.stage }}
      environment_name: dev-aws-account
      skip_tests: true
      # Reuse the shared dev MLflow tracking server already running in the
      # account (smus-integration-mlflow-<region>, matching the manifest
      # default) so the tracking-server ARN is valid. The reusable only verifies
      # the server exists and provisions one via CloudFormation solely if it is
      # missing - it does not recreate the existing server.
      setup_mlflow: true

  # Build + upload the training source bundle to the dev project's shared S3
  # after the deploys (dev only), so the deploy's src/ sync cannot clobber it.
  upload-sourcedir:
    name: Upload Artifacts
    needs: [deploy]
    if: ${{ always() && needs.deploy.result == 'success' && (inputs.stages == '' || inputs.stages == 'all' || inputs.stages == 'dev') }}
    runs-on: ubuntu-latest
    environment: dev-aws-account
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install SMUS CI/CD CLI
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ vars.DOMAIN_REGION }}
          role-session-name: smus-mlops-sourcedir-upload

      - name: Get AWS Account ID
        id: aws-account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account-id=$ACCOUNT_ID" >> "$GITHUB_OUTPUT"

      - name: Build + upload sourcedir.tar.gz
        env:
          DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          DEV_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          AWS_ACCOUNT_ID: ${{ steps.aws-account.outputs.account-id }}
        run: |
          set -euo pipefail
          bash examples/end-to-end-data-ml-pipeline/scripts/build-mlops-sourcedir.sh
          MANIFEST="examples/end-to-end-data-ml-pipeline/examples/mlops-pipeline/manifest.yaml"
          SRC="examples/end-to-end-data-ml-pipeline/examples/mlops-pipeline/src/sourcedir.tar.gz"

          aws-smus-cicd-cli describe --manifest "$MANIFEST" --targets dev --connect --output JSON > describe.json

          S3_URI=$(python3 - <<'PY'
          import json, sys
          text = open("describe.json").read()
          start, end = text.find("{"), text.rfind("}")
          if start == -1 or end == -1:
              sys.exit("No JSON object found in describe output")
          data = json.loads(text[start:end + 1])
          uri = data.get("targets", {}).get("dev", {}).get("connections", {}).get("default.s3_shared", {}).get("s3Uri", "")
          if not uri:
              sys.exit("Could not resolve default.s3_shared s3Uri")
          print(uri)
          PY
          )

          DEST="${S3_URI%/}/bank-mktg/mlops_pipeline/src/sourcedir.tar.gz"
          aws s3 cp "$SRC" "$DEST"
          aws s3 ls "$DEST"
