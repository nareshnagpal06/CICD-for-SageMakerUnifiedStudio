name: E2E Deploy MLOps Pipeline

on:
  push:
    branches:
      - main
      - test
    paths:
      - 'examples/end-to-end-data-ml-pipeline/examples/mlops-pipeline/**'
      - 'src/**'
      - '.github/workflows/smus-direct-deploy.yml'
      - '.github/workflows/e2e-mlops-pipeline.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment to deploy"
        required: true
        default: "dev"
        type: choice
        options: [dev, test, prod]
      setup_infra:
        description: "Provision MLOps infra (EventBridge + Lambda deploy trigger)"
        required: false
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  # --------------------------------------------------------------------------
  # Job 1: Build sourcedir.tar.gz (training script + requirements.txt)
  # --------------------------------------------------------------------------
  prebuild:
    name: Build Training Source Bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sourcedir.tar.gz
        run: |
          echo "🔧 Building MLOps training source bundle..."
          bash examples/end-to-end-data-ml-pipeline/scripts/build-mlops-sourcedir.sh

      - name: Upload source bundle
        uses: actions/upload-artifact@v4
        with:
          name: mlops-sourcedir-${{ github.run_id }}
          path: examples/end-to-end-data-ml-pipeline/examples/mlops-pipeline/src/sourcedir.tar.gz
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # Job 2: Provision MLOps infra (EventBridge + Lambda deploy trigger)
  #         Only runs on workflow_dispatch with setup_infra=true
  # --------------------------------------------------------------------------
  setup-infra:
    name: Setup MLOps Infrastructure
    runs-on: ubuntu-latest
    if: ${{ inputs.setup_infra == true }}
    environment: test-aws-account
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_TEST }}
          aws-region: ${{ vars.DOMAIN_REGION }}
          role-session-name: smus-mlops-infra-session

      - name: Get AWS Account ID
        id: aws-account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account-id=$ACCOUNT_ID" >> $GITHUB_OUTPUT
          echo "✓ AWS Account ID: $ACCOUNT_ID"

      - name: Provision MLOps infra
        env:
          GITHUB_REPO: ${{ github.repository }}
        run: |
          REGION="${{ vars.DOMAIN_REGION }}"
          ACCOUNT_ID="${{ steps.aws-account.outputs.account-id }}"
          PROJECT_NAME="bank-mktg-${{ inputs.environment || 'dev' }}"

          echo "🚧 Provisioning MLOps infra for ${{ inputs.environment || 'dev' }}"
          bash examples/end-to-end-data-ml-pipeline/scripts/setup-mlops-infra.sh \
            "${{ inputs.environment || 'dev' }}" \
            "$ACCOUNT_ID" \
            "$REGION" \
            "$PROJECT_NAME"

  # --------------------------------------------------------------------------
  # Job 3: Deploy using smus-direct-deploy (single-hop OIDC auth)
  # --------------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: prebuild
    uses: ./.github/workflows/smus-direct-deploy.yml
    with:
      manifest_path: 'examples/end-to-end-data-ml-pipeline/examples/mlops-pipeline/manifest.yaml'
      test_target: ${{ inputs.environment || 'dev' }}
      setup_mlflow: true
      skip_tests: true
    secrets:
      AWS_ROLE_ARN_TEST: ${{ secrets.AWS_ROLE_ARN_TEST }}
