name: SMUS E2E Direct Deploy (Reusable)

on:
  workflow_call:
    inputs:
      manifest_path:
        description: 'Path to manifest file'
        required: false
        type: string
        default: 'manifest.yaml'

      test_target:
        description: 'Stage target name (also used as the GitHub Environment)'
        required: false
        type: string
        default: 'dev'

      python_version:
        description: 'Python version'
        required: false
        type: string
        default: '3.12'

      skip_tests:
        description: 'Skip test execution'
        required: false
        type: boolean
        default: false

      setup_mlflow:
        description: 'Setup MLflow tracking server infrastructure'
        required: false
        type: boolean
        default: false

      setup_infra:
        description: 'Provision MLOps infra (EventBridge + Lambda deploy trigger) before deploying'
        required: false
        type: boolean
        default: false

      prebuild_script:
        description: 'Optional path to a script to run before deploy (e.g. build sourcedir.tar.gz)'
        required: false
        type: string
        default: ''

      github_repo:
        description: "GitHub repo (owner/repo) the deploy-trigger Lambda dispatches into (defaults to this repo)"
        required: false
        type: string
        default: ''

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    # Run inside the per-stage GitHub Environment so OIDC role + vars resolve
    # from `dev`, `test`, or `prod` based on the caller's `test_target` input.
    environment: ${{ inputs.test_target }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install SMUS CI/CD CLI
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: smus-e2e-deploy-session

      - name: Get AWS Account ID
        id: aws-account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account-id=$ACCOUNT_ID" >> $GITHUB_OUTPUT
          echo "✓ AWS Account ID: $ACCOUNT_ID"

      - name: Assume project role
        # The OIDC role only has sts:AssumeRole on the deployment role.
        # DataZone / SageMaker / S3 calls need the broader-perm project role.
        shell: bash
        run: |
          CREDS=$(aws sts assume-role \
            --role-arn "arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.DEPLOYMENT_ROLE_NAME }}" \
            --role-session-name "smus-e2e-deploy-${{ inputs.test_target }}-${{ github.run_id }}" \
            --query 'Credentials' --output json)
          echo "::add-mask::$(echo "$CREDS" | jq -r .AccessKeyId)"
          echo "::add-mask::$(echo "$CREDS" | jq -r .SecretAccessKey)"
          echo "::add-mask::$(echo "$CREDS" | jq -r .SessionToken)"
          {
            echo "AWS_ACCESS_KEY_ID=$(echo "$CREDS" | jq -r .AccessKeyId)"
            echo "AWS_SECRET_ACCESS_KEY=$(echo "$CREDS" | jq -r .SecretAccessKey)"
            echo "AWS_SESSION_TOKEN=$(echo "$CREDS" | jq -r .SessionToken)"
          } >> $GITHUB_ENV

      - name: Provision MLOps infra
        # Idempotent: EventBridge rule + Lambda deploy trigger + IAM role.
        # The assumed project role already has the IAM/Lambda/EventBridge perms.
        if: ${{ inputs.setup_infra }}
        shell: bash
        env:
          GITHUB_REPO: ${{ inputs.github_repo || github.repository }}
        run: |
          REGION="${{ vars.AWS_REGION || 'us-east-1' }}"
          PROJECT_NAME="${{ vars.PROJECT_NAME || format('bank-mktg-{0}', inputs.test_target) }}"
          SECRET_ID="bank-mktg/github-token"

          if ! aws secretsmanager describe-secret --secret-id "$SECRET_ID" --region "$REGION" >/dev/null 2>&1; then
            echo "::error::Secret '$SECRET_ID' not found in region $REGION."
            echo "::error::Create it with: aws secretsmanager create-secret --name $SECRET_ID --secret-string <PAT> --region $REGION"
            exit 1
          fi

          echo "::group::🚧 Provisioning MLOps infra for ${{ inputs.test_target }}"
          bash examples/end-to-end-data-ml-pipeline/scripts/setup-mlops-infra.sh \
            "${{ inputs.test_target }}" \
            "${{ steps.aws-account.outputs.account-id }}" \
            "$REGION" \
            "$PROJECT_NAME"
          echo "::endgroup::"

      - name: Setup MLflow Tracking Server
        id: mlflow-setup
        if: ${{ inputs.setup_mlflow }}
        run: |
          REGION="${{ vars.AWS_REGION }}"
          ACCOUNT_ID="${{ steps.aws-account.outputs.account-id }}"
          STACK_NAME="smus-shared-resources"
          TRACKING_SERVER_NAME="smus-integration-mlflow-${REGION}"

          echo "🔍 Checking for existing MLflow tracking server..."

          SERVER_EXISTS=$(aws sagemaker list-mlflow-tracking-servers \
            --region "$REGION" \
            --query "TrackingServerSummaries[?TrackingServerName=='$TRACKING_SERVER_NAME'].TrackingServerName" \
            --output text)

          if [ -n "$SERVER_EXISTS" ]; then
            echo "✅ MLflow tracking server '$TRACKING_SERVER_NAME' already exists"
            echo "tracking-server-name=$TRACKING_SERVER_NAME" >> $GITHUB_OUTPUT
          else
            echo "📦 MLflow tracking server not found, deploying CloudFormation stack..."

            aws cloudformation deploy \
              --template-file tests/scripts/setup/idc-based-domains/5-testing-infrastructure/testing-infrastructure/shared-resources-template.yaml \
              --stack-name "$STACK_NAME" \
              --parameter-overrides \
                S3BucketName="smus-mlflow-artifacts-${ACCOUNT_ID}-${REGION}" \
                TrackingServerName="$TRACKING_SERVER_NAME" \
                TrackingServerSize="Small" \
              --capabilities CAPABILITY_NAMED_IAM \
              --region "$REGION"

            MLFLOW_ARN=$(aws cloudformation describe-stacks \
              --stack-name "$STACK_NAME" \
              --region "$REGION" \
              --query 'Stacks[0].Outputs[?OutputKey==`MLflowTrackingServerArn`].OutputValue' \
              --output text)

            echo "✅ MLflow infrastructure deployed successfully"
            echo "   Tracking Server: $TRACKING_SERVER_NAME"
            echo "   ARN: $MLFLOW_ARN"
            echo "tracking-server-name=$TRACKING_SERVER_NAME" >> $GITHUB_OUTPUT
          fi

      - name: Build source bundle (prebuild)
        # Optional example-specific build step (e.g. package train script +
        # requirements.txt into sourcedir.tar.gz) so the bundle uploaded by
        # the deploy below is always in sync with the committed source files.
        if: ${{ inputs.prebuild_script != '' }}
        shell: bash
        run: |
          echo "🔧 Running prebuild script: ${{ inputs.prebuild_script }}"
          bash "${{ inputs.prebuild_script }}"

      - name: aws-smus-cicd-cli deploy
        env:
          DOMAIN_REGION: ${{ vars.AWS_REGION }}
          DEV_DOMAIN_REGION: ${{ vars.AWS_REGION }}
          TEST_DOMAIN_REGION: ${{ vars.AWS_REGION }}
          PROD_DOMAIN_REGION: ${{ vars.AWS_REGION }}
          DEV_DOMAIN_NAME: ${{ vars.DEV_DOMAIN_NAME }}
          TEST_DOMAIN_NAME: ${{ vars.TEST_DOMAIN_NAME }}
          PROD_DOMAIN_NAME: ${{ vars.PROD_DOMAIN_NAME }}
          DEV_PROJECT_NAME: ${{ vars.DEV_PROJECT_NAME }}
          TEST_PROJECT_NAME: ${{ vars.TEST_PROJECT_NAME }}
          PROD_PROJECT_NAME: ${{ vars.PROD_PROJECT_NAME }}
          DEV_REGION: ${{ vars.AWS_REGION }}
          TEST_REGION: ${{ vars.AWS_REGION }}
          PROD_REGION: ${{ vars.AWS_REGION }}
          AWS_ACCOUNT_ID: ${{ steps.aws-account.outputs.account-id }}
          STS_REGION: ${{ vars.AWS_REGION }}
          STS_ACCOUNT_ID: ${{ steps.aws-account.outputs.account-id }}
          MLFLOW_TRACKING_SERVER_NAME: ${{ inputs.setup_mlflow && format('smus-integration-mlflow-{0}', vars.AWS_REGION) || '' }}
        run: |
          echo "🚀 Deploying to target: ${{ inputs.test_target }}"

          aws-smus-cicd-cli deploy \
            --manifest ${{ inputs.manifest_path }} \
            --targets ${{ inputs.test_target }}

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ !inputs.skip_tests }}
    environment: ${{ inputs.test_target }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install SMUS CI/CD CLI
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: smus-e2e-test-session

      - name: Get AWS Account ID
        id: aws-account-test
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account-id=$ACCOUNT_ID" >> $GITHUB_OUTPUT

      - name: Assume project role
        shell: bash
        run: |
          CREDS=$(aws sts assume-role \
            --role-arn "arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.DEPLOYMENT_ROLE_NAME }}" \
            --role-session-name "smus-e2e-test-${{ inputs.test_target }}-${{ github.run_id }}" \
            --query 'Credentials' --output json)
          echo "::add-mask::$(echo "$CREDS" | jq -r .AccessKeyId)"
          echo "::add-mask::$(echo "$CREDS" | jq -r .SecretAccessKey)"
          echo "::add-mask::$(echo "$CREDS" | jq -r .SessionToken)"
          {
            echo "AWS_ACCESS_KEY_ID=$(echo "$CREDS" | jq -r .AccessKeyId)"
            echo "AWS_SECRET_ACCESS_KEY=$(echo "$CREDS" | jq -r .SecretAccessKey)"
            echo "AWS_SESSION_TOKEN=$(echo "$CREDS" | jq -r .SessionToken)"
          } >> $GITHUB_ENV

      - name: aws-smus-cicd-cli test
        env:
          DOMAIN_REGION: ${{ vars.AWS_REGION }}
          DEV_DOMAIN_REGION: ${{ vars.AWS_REGION }}
          TEST_DOMAIN_REGION: ${{ vars.AWS_REGION }}
          PROD_DOMAIN_REGION: ${{ vars.AWS_REGION }}
          DEV_DOMAIN_NAME: ${{ vars.DEV_DOMAIN_NAME }}
          TEST_DOMAIN_NAME: ${{ vars.TEST_DOMAIN_NAME }}
          PROD_DOMAIN_NAME: ${{ vars.PROD_DOMAIN_NAME }}
          DEV_PROJECT_NAME: ${{ vars.DEV_PROJECT_NAME }}
          TEST_PROJECT_NAME: ${{ vars.TEST_PROJECT_NAME }}
          PROD_PROJECT_NAME: ${{ vars.PROD_PROJECT_NAME }}
          DEV_REGION: ${{ vars.AWS_REGION }}
          TEST_REGION: ${{ vars.AWS_REGION }}
          PROD_REGION: ${{ vars.AWS_REGION }}
          AWS_ACCOUNT_ID: ${{ steps.aws-account-test.outputs.account-id }}
          STS_REGION: ${{ vars.AWS_REGION }}
          STS_ACCOUNT_ID: ${{ steps.aws-account-test.outputs.account-id }}
          MLFLOW_TRACKING_SERVER_NAME: ${{ inputs.setup_mlflow && format('smus-integration-mlflow-{0}', vars.AWS_REGION) || '' }}
        run: |
          aws-smus-cicd-cli test \
            --manifest ${{ inputs.manifest_path }} \
            --targets ${{ inputs.test_target }}
