name: E2E Deploy DataOps Pipeline

on:
  push:
    branches:
      - main
      - test
    paths:
      - 'examples/end-to-end-data-ml-pipeline/examples/dataops-pipeline/**'
      - 'src/**'
      - '.github/workflows/smus-direct-deploy.yml'
      - '.github/workflows/e2e-dataops-pipeline.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

# Single source of truth for the deploy environment name.
env:
  DEV_ENVIRONMENT: dev-aws-account

jobs:
  # Exposes the env value as a job output, since `with:` can't read the workflow
  # `env` context directly (it can read needs).
  config:
    runs-on: ubuntu-latest
    outputs:
      dev_environment: ${{ steps.vars.outputs.dev_environment }}
    steps:
      - id: vars
        run: echo "dev_environment=$DEV_ENVIRONMENT" >> "$GITHUB_OUTPUT"

  deploy:
    # Uses the shared reusable. The dev OIDC role (AWS_ROLE_ARN_DEV) is mapped
    # into the reusable's generic AWS_ROLE_ARN secret; region comes from the
    # environment's DOMAIN_REGION.
    needs: [config]
    uses: ./.github/workflows/smus-direct-deploy.yml
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN_DEV }}
    with:
      manifest_path: 'examples/end-to-end-data-ml-pipeline/examples/dataops-pipeline/manifest.yaml'
      target: 'dev'
      environment_name: ${{ needs.config.outputs.dev_environment }}
      skip_tests: true
