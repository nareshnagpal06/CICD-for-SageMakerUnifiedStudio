name: E2E Deploy DataOps Pipeline

on:
  push:
    branches:
      - main
      - test
    paths:
      - 'examples/end-to-end-data-ml-pipeline/examples/dataops-pipeline/**'
      - 'src/**'
      - '.github/workflows/smus-direct-deploy.yml'
      - '.github/workflows/e2e-dataops-pipeline.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    # Uses the shared reusable, running in the dev-aws-account environment. The
    # dev OIDC role (AWS_ROLE_ARN_DEV) is mapped into the reusable's generic
    # AWS_ROLE_ARN secret; the region comes from the environment's DOMAIN_REGION.
    uses: ./.github/workflows/smus-direct-deploy.yml
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN_DEV }}
    with:
      manifest_path: 'examples/end-to-end-data-ml-pipeline/examples/dataops-pipeline/manifest.yaml'
      target: 'dev'
      environment_name: 'dev-aws-account'
      skip_tests: true
