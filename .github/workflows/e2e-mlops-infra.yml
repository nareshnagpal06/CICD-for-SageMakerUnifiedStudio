# =============================================================================
# MLOps Infrastructure Setup - Bank Mktg Prediction
# =============================================================================
# One-time-per-stage provisioning of the MLOps supporting infrastructure:
#   1. SageMaker MLflow tracking server (uses the project's SMUS S3 bucket)
#   2. EventBridge rule + Lambda that fires mlops-promote.yml on model
#      approval (the registry-side trigger that kicks off the cascade)
#
# This wraps `examples/end-to-end-data-ml-pipeline/scripts/setup-mlops-infra.sh`
# so the same provisioning steps
# can be run from the Actions UI without local credentials. The script is
# idempotent: re-running against the same stage is safe.
#
# Trigger: workflow_dispatch only. This is *infrastructure*, not a per-deploy
# operation - run it after creating a new SMUS project, or whenever you need
# to update the Lambda's environment vars.
#
# Required GitHub vars per environment (dev/test/prod):
#   AWS_ROLE_ARN          - OIDC role for the stage
#   AWS_ACCOUNT_ID        - AWS account
#   DEPLOYMENT_ROLE_NAME  - Project role to assume
#   AWS_REGION            - Region (default us-east-1)
#   PROJECT_NAME          - SMUS project name (e.g. bank-mktg-dev)
#
# Required Secrets Manager secret (must already exist in the target account):
#   bank-mktg/github-token - GitHub PAT with `repo` scope so the Lambda can
#                            POST to /repos/<owner>/<repo>/dispatches
# =============================================================================

name: E2E MLOps Infra Setup

on:
  workflow_dispatch:
    inputs:
      stage:
        description: "Target stage for infra setup."
        required: true
        default: "dev"
        type: choice
        options: [dev, test, prod]
      github_repo:
        description: "GitHub repo (owner/repo) the Lambda dispatches into."
        required: false
        default: "velpualvi/blog-smus-ops"
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  setup:
    name: Setup MLOps Infra
    runs-on: ubuntu-latest
    # Use the per-stage GitHub Environment so OIDC role + account vars come
    # from the right place. Manual approvers configured here will gate the
    # infra change too, which is usually what you want for prod.
    environment: ${{ inputs.stage }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Authenticate via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Assume project role
        # The OIDC role only has sts:AssumeRole on dataops-admin. The infra
        # script needs broader perms (IAM, SageMaker, EventBridge, Lambda),
        # which dataops-admin has.
        shell: bash
        run: |
          CREDS=$(aws sts assume-role \
            --role-arn "arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.DEPLOYMENT_ROLE_NAME }}" \
            --role-session-name "mlops-infra-${{ inputs.stage }}-${{ github.run_id }}" \
            --query 'Credentials' --output json)
          echo "::add-mask::$(echo "$CREDS" | jq -r .AccessKeyId)"
          echo "::add-mask::$(echo "$CREDS" | jq -r .SecretAccessKey)"
          echo "::add-mask::$(echo "$CREDS" | jq -r .SessionToken)"
          {
            echo "AWS_ACCESS_KEY_ID=$(echo "$CREDS" | jq -r .AccessKeyId)"
            echo "AWS_SECRET_ACCESS_KEY=$(echo "$CREDS" | jq -r .SecretAccessKey)"
            echo "AWS_SESSION_TOKEN=$(echo "$CREDS" | jq -r .SessionToken)"
          } >> $GITHUB_ENV

      - name: Verify GitHub PAT secret exists
        # Fail fast with a clear message if the operator forgot to create
        # the GitHub PAT secret. Without it the Lambda would deploy fine
        # but silently fail to dispatch on every model approval.
        shell: bash
        run: |
          REGION="${{ vars.AWS_REGION || 'us-east-1' }}"
          SECRET_ID="bank-mktg/github-token"
          if ! aws secretsmanager describe-secret --secret-id "$SECRET_ID" --region "$REGION" >/dev/null 2>&1; then
            echo "::error::Secret '$SECRET_ID' not found in region $REGION."
            echo "::error::Create it with:"
            echo "::error::  aws secretsmanager create-secret --name $SECRET_ID --secret-string <PAT> --region $REGION"
            exit 1
          fi
          echo "✓ Found secret $SECRET_ID"

      - name: Run MLOps infra setup
        shell: bash
        env:
          GITHUB_REPO: ${{ inputs.github_repo }}
        run: |
          PROJECT_NAME="${{ vars.PROJECT_NAME || format('bank-mktg-{0}', inputs.stage) }}"
          REGION="${{ vars.AWS_REGION || 'us-east-1' }}"

          echo "::group::🚧 Provisioning MLOps infra for ${{ inputs.stage }}"
          bash examples/end-to-end-data-ml-pipeline/scripts/setup-mlops-infra.sh \
            "${{ inputs.stage }}" \
            "${{ vars.AWS_ACCOUNT_ID }}" \
            "$REGION" \
            "$PROJECT_NAME"
          echo "::endgroup::"

      - name: Summary
        if: ${{ always() }}
        shell: bash
        run: |
          echo "### 🚧 MLOps Infra Setup" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Stage         | ${{ inputs.stage }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Account       | ${{ vars.AWS_ACCOUNT_ID }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Region        | ${{ vars.AWS_REGION || 'us-east-1' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub repo   | ${{ inputs.github_repo }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Resources provisioned (idempotent):" >> $GITHUB_STEP_SUMMARY
          echo "- MLflow tracking server: \`${{ vars.PROJECT_NAME || format('bank-mktg-{0}', inputs.stage) }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- EventBridge rule: \`bank-mktg-model-approved\`" >> $GITHUB_STEP_SUMMARY
          echo "- Lambda function: \`bank-mktg-airflow-deploy-trigger\`" >> $GITHUB_STEP_SUMMARY
