# =============================================================================
# E2E MLOps Model Deploy (Manual)
# =============================================================================
# Manual single-stage (or all-stages) deploy of the latest Approved model.
# Drives the same `deploy_pipeline` DAG used by the promote workflow but
# without manual approval gates, smoke tests, or log capture.
#
# Optionally provisions the per-stage MLOps supporting infrastructure first
# (EventBridge rule + Lambda that dispatches the promote workflow on model
# approval) by setting `setup_infra: true`. This wraps the idempotent
# `scripts/setup-mlops-infra.sh`, so re-running against a stage is safe.
#
# Use this for ad-hoc redeploys / debugging. Event-driven promotion (kicked
# off by SageMaker model approval) lives in `e2e-mlops-promote.yml`, which
# owns the `repository_dispatch: [model-approved]` trigger.
# =============================================================================

name: E2E MLOps Model Deploy (Manual)

on:
  workflow_dispatch:
    inputs:
      stage:
        description: "Target deployment stage"
        required: true
        default: "dev"
        type: choice
        options: [dev, test, prod, all]
      model_package_arn:
        description: "Override model package ARN (default: latest Approved)"
        required: false
        default: ""
        type: string
      setup_infra:
        description: "Provision MLOps infra (EventBridge + Lambda deploy trigger) before deploying"
        required: false
        default: false
        type: boolean
      github_repo:
        description: "GitHub repo (owner/repo) the deploy-trigger Lambda dispatches into (defaults to this repo)"
        required: false
        default: ""
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  # Resolve the requested stage(s) once so the deploy job can fan out via matrix.
  resolve:
    name: Resolve target stages
    runs-on: ubuntu-latest
    outputs:
      stages: ${{ steps.set.outputs.stages }}
      model_package_arn: ${{ steps.set.outputs.model_package_arn }}
      model_package_group: ${{ steps.set.outputs.model_package_group }}
    steps:
      - id: set
        shell: bash
        run: |
          STAGE="${{ inputs.stage }}"
          STAGE="${STAGE:-dev}"

          if [ "$STAGE" = "all" ]; then
            echo 'stages=["dev","test","prod"]' >> $GITHUB_OUTPUT
          else
            echo "stages=[\"$STAGE\"]" >> $GITHUB_OUTPUT
          fi

          # Sentinel "none" lets the SMUS CLI manifest validator pass when no
          # model-package override is supplied.
          ARN="${{ inputs.model_package_arn }}"
          echo "model_package_arn=${ARN:-none}" >> $GITHUB_OUTPUT
          echo "model_package_group=bank-mktg-prediction-models" >> $GITHUB_OUTPUT

  deploy-model:
    name: Deploy Approved Model (${{ matrix.stage }})
    needs: resolve
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        stage: ${{ fromJSON(needs.resolve.outputs.stages) }}
    environment: ${{ matrix.stage }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install SMUS CI/CD CLI
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.DOMAIN_REGION }}
          role-session-name: smus-e2e-mlops-deploy

      - name: Assume project role
        # The OIDC role only has sts:AssumeRole on the deployment role.
        # DataZone / SageMaker / S3 calls need the broader-perm project role.
        shell: bash
        run: |
          CREDS=$(aws sts assume-role \
            --role-arn "arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.DEPLOYMENT_ROLE_NAME }}" \
            --role-session-name "smus-e2e-mlops-deploy-${{ matrix.stage }}-${{ github.run_id }}" \
            --query 'Credentials' --output json)
          echo "::add-mask::$(echo "$CREDS" | jq -r .AccessKeyId)"
          echo "::add-mask::$(echo "$CREDS" | jq -r .SecretAccessKey)"
          echo "::add-mask::$(echo "$CREDS" | jq -r .SessionToken)"
          {
            echo "AWS_ACCESS_KEY_ID=$(echo "$CREDS" | jq -r .AccessKeyId)"
            echo "AWS_SECRET_ACCESS_KEY=$(echo "$CREDS" | jq -r .SecretAccessKey)"
            echo "AWS_SESSION_TOKEN=$(echo "$CREDS" | jq -r .SessionToken)"
          } >> $GITHUB_ENV

      - name: Verify GitHub PAT secret exists
        # Only needed when provisioning infra. Fail fast with a clear message
        # if the operator forgot to create the GitHub PAT secret. Without it
        # the Lambda would deploy fine but silently fail to dispatch on every
        # model approval.
        if: ${{ inputs.setup_infra }}
        shell: bash
        run: |
          REGION="${{ vars.DOMAIN_REGION || 'us-east-1' }}"
          SECRET_ID="bank-mktg/github-token"
          if ! aws secretsmanager describe-secret --secret-id "$SECRET_ID" --region "$REGION" >/dev/null 2>&1; then
            echo "::error::Secret '$SECRET_ID' not found in region $REGION."
            echo "::error::Create it with:"
            echo "::error::  aws secretsmanager create-secret --name $SECRET_ID --secret-string <PAT> --region $REGION"
            exit 1
          fi
          echo "✓ Found secret $SECRET_ID"

      - name: Provision MLOps infra (${{ matrix.stage }})
        # Idempotent: EventBridge rule + Lambda deploy trigger + IAM role.
        # The assumed project role already has the IAM/Lambda/EventBridge perms.
        if: ${{ inputs.setup_infra }}
        shell: bash
        env:
          GITHUB_REPO: ${{ inputs.github_repo || github.repository }}
        run: |
          PROJECT_NAME="${{ vars.PROJECT_NAME || format('bank-mktg-{0}', matrix.stage) }}"
          REGION="${{ vars.DOMAIN_REGION || 'us-east-1' }}"

          echo "::group::🚧 Provisioning MLOps infra for ${{ matrix.stage }}"
          bash examples/end-to-end-data-ml-pipeline/scripts/setup-mlops-infra.sh \
            "${{ matrix.stage }}" \
            "${{ vars.AWS_ACCOUNT_ID }}" \
            "$REGION" \
            "$PROJECT_NAME"
          echo "::endgroup::"

      - name: Set manifest substitution env
        # SMUS CLI rejects unresolved substitutions in the manifest. Set sentinels
        # for the model-promotion vars and expose GIT_COMMIT so the manifest can
        # pin to the dispatching commit.
        run: |
          {
            echo "GIT_COMMIT=${{ github.sha }}"
            echo "MODEL_PACKAGE_ARN=${{ needs.resolve.outputs.model_package_arn }}"
            echo "MODEL_PACKAGE_GROUP=${{ needs.resolve.outputs.model_package_group }}"
            echo "MODEL_DATA_URL_OVERRIDE=none"
          } >> $GITHUB_ENV

      - name: Deploy approved model to ${{ matrix.stage }}
        env:
          DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          DEV_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          TEST_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          PROD_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
        shell: bash
        run: |
          MANIFEST="examples/end-to-end-data-ml-pipeline/examples/mlops-pipeline/manifest.yaml"
          STAGE="${{ matrix.stage }}"
          STAGE_START=$(date +%s)

          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║  MLOps Model Deploy (Manual)"
          echo "╠══════════════════════════════════════════════════════════╣"
          echo "║  Stage              : ${STAGE}"
          echo "║  Model Package ARN  : ${MODEL_PACKAGE_ARN}"
          echo "║  Model Package Group: ${MODEL_PACKAGE_GROUP}"
          echo "║  Triggered by       : ${{ github.actor }}"
          echo "║  Run ID             : ${{ github.run_id }}"
          echo "║  Commit             : ${GIT_COMMIT}"
          echo "╚══════════════════════════════════════════════════════════╝"

          echo "::group::🔍 Validating target ${STAGE}"
          aws-smus-cicd-cli describe \
            --manifest "$MANIFEST" \
            --targets "$STAGE" \
            --connect
          echo "::endgroup::"

          echo "::group::🚀 Triggering deploy_pipeline for ${STAGE}"
          aws-smus-cicd-cli run \
            --manifest "$MANIFEST" \
            --targets "$STAGE" \
            --workflow deploy_pipeline
          echo "::endgroup::"

          echo "::group::📡 Monitoring deploy_pipeline for ${STAGE}"
          aws-smus-cicd-cli monitor \
            --manifest "$MANIFEST" \
            --targets "$STAGE"
          echo "::endgroup::"

          STAGE_END=$(date +%s)
          STAGE_DURATION=$((STAGE_END - STAGE_START))
          echo "✅ ${STAGE} deployment complete (${STAGE_DURATION}s)"
