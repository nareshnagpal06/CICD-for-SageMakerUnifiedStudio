name: E2E MLOps Model Deploy (Event-Driven)

on:
  repository_dispatch:
    types: [model-approved]
  workflow_dispatch:
    inputs:
      stage:
        description: "Target deployment stage"
        required: true
        default: "dev"
        type: choice
        options: [dev, test, prod]

permissions:
  id-token: write
  contents: read

jobs:
  deploy-model:
    name: Deploy Approved Model
    runs-on: ubuntu-latest
    environment: ${{ fromJSON('{"dev":"dev-aws-account","test":"test-aws-account","prod":"prod-aws-account"}')[github.event.client_payload.stage || inputs.stage || 'dev'] || 'dev-aws-account' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install SMUS CI/CD CLI
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Resolve deployment parameters
        id: params
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            STAGE="${{ github.event.client_payload.stage }}"
            MODEL_PKG_ARN="${{ github.event.client_payload.model_package_arn }}"
            MODEL_PKG_GROUP="${{ github.event.client_payload.model_package_group }}"
          else
            STAGE="${{ inputs.stage }}"
            MODEL_PKG_ARN=""
            MODEL_PKG_GROUP="bank-mktg-prediction-models"
          fi

          echo "stage=${STAGE:-dev}" >> $GITHUB_OUTPUT
          echo "model_package_arn=${MODEL_PKG_ARN}" >> $GITHUB_OUTPUT
          echo "model_package_group=${MODEL_PKG_GROUP:-bank-mktg-prediction-models}" >> $GITHUB_OUTPUT

      - name: Determine AWS Role ARN
        id: role
        run: |
          case "${{ steps.params.outputs.stage }}" in
            dev)
              echo "role-arn=${{ secrets.AWS_ROLE_ARN_DEV }}" >> $GITHUB_OUTPUT
              ;;
            test)
              echo "role-arn=${{ secrets.AWS_ROLE_ARN_TEST }}" >> $GITHUB_OUTPUT
              ;;
            prod)
              echo "role-arn=${{ secrets.AWS_ROLE_ARN_PROD }}" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "❌ Invalid stage: ${{ steps.params.outputs.stage }}"
              exit 1
              ;;
          esac

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.role.outputs.role-arn }}
          aws-region: ${{ vars.DOMAIN_REGION }}
          role-session-name: smus-e2e-mlops-deploy

      - name: aws-smus-cicd-cli describe (validate target)
        env:
          DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          DEV_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          TEST_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          PROD_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
        run: |
          echo "🔍 Validating target: ${{ steps.params.outputs.stage }}"
          aws-smus-cicd-cli describe \
            --manifest examples/end-to-end-data-ml-pipeline/examples/mlops-pipeline/manifest.yaml \
            --targets ${{ steps.params.outputs.stage }} \
            --connect

      - name: Trigger deploy pipeline
        env:
          DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          DEV_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          TEST_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          PROD_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          MODEL_PACKAGE_ARN: ${{ steps.params.outputs.model_package_arn }}
          MODEL_PACKAGE_GROUP: ${{ steps.params.outputs.model_package_group }}
        run: |
          echo "🚀 Triggering deploy_pipeline for stage: ${{ steps.params.outputs.stage }}"
          aws-smus-cicd-cli run \
            --manifest examples/end-to-end-data-ml-pipeline/examples/mlops-pipeline/manifest.yaml \
            --targets ${{ steps.params.outputs.stage }} \
            --workflow deploy_pipeline

      - name: Monitor deploy pipeline
        env:
          DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          DEV_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          TEST_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
          PROD_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
        run: |
          aws-smus-cicd-cli monitor \
            --manifest examples/end-to-end-data-ml-pipeline/examples/mlops-pipeline/manifest.yaml \
            --targets ${{ steps.params.outputs.stage }}
