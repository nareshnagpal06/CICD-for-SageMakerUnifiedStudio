name: E2E MLOps Promotion (dev -> test -> prod)

# Promotes a single approved model package across dev -> test -> prod, running
# the deploy_pipeline workflow in each stage's project with manual approval
# gates before test and prod. Approval is via a GitHub issue; any user with
# write/triage access to the repo (who can manage/close issues) may approve.
# Per-stage environments come from the resolve-config job (today all point at
# dev-aws-account) and every job assumes AWS_ROLE_ARN_DEV (single-account).

on:
  workflow_dispatch:
    inputs:
      start_at:
        description: "First stage to deploy. Subsequent stages run sequentially."
        required: true
        default: "dev"
        type: choice
        options: [dev, test, prod]
      run_smoke_test:
        description: "Run endpoint smoke test after each deploy"
        required: false
        default: true
        type: boolean
      model_package_arn:
        description: "Override model package ARN (default: latest Approved)"
        required: false
        default: ""
        type: string
  # Fired by the setup-mlops-infra.sh Lambda on model approval (payload pins
  # client_payload.model_package_arn) to auto-start the full cascade from dev.
  repository_dispatch:
    types: [model-approved]

permissions:
  id-token: write
  contents: read
  issues: write  # approval gate opens/closes a tracking issue

env:
  WORKFLOW_NAME: deploy_pipeline
  MANIFEST_DIR: examples/end-to-end-data-ml-pipeline/examples/mlops-pipeline
  MODEL_PACKAGE_GROUP: bank-mktg-prediction-models
  MLOPS_HELPER: examples/end-to-end-data-ml-pipeline/scripts/mlops_helper.py
  # Region for helper CLI calls; shared by every job (falls back to us-east-1).
  REGION: ${{ vars.DOMAIN_REGION || 'us-east-1' }}
  # Per-stage GitHub Environment (single source of truth; today all -> dev-aws-account).
  DEV_ENVIRONMENT: dev-aws-account
  TEST_ENVIRONMENT: dev-aws-account
  PROD_ENVIRONMENT: dev-aws-account
  # SMUS project names + regions consumed by the CLI (manifest ${..} substitution
  # and mlops_helper.py), shared by every deploy job.
  DEV_PROJECT_NAME: ${{ vars.DEV_PROJECT_NAME || 'e2e-data-ml-ops-dev' }}
  TEST_PROJECT_NAME: ${{ vars.TEST_PROJECT_NAME || 'e2e-data-ml-ops-test' }}
  PROD_PROJECT_NAME: ${{ vars.PROD_PROJECT_NAME || 'e2e-data-ml-ops-prod' }}
  DEV_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
  TEST_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
  PROD_DOMAIN_REGION: ${{ vars.DOMAIN_REGION }}
  MLFLOW_TRACKING_SERVER_NAME: ${{ vars.MLFLOW_TRACKING_SERVER_NAME || 'smus-integration-mlflow-us-east-1' }}
  MLFLOW_TRACKING_SERVER_ARN: ${{ vars.MLFLOW_TRACKING_SERVER_ARN }}

jobs:
  # Exposes per-stage environment names as job outputs, since the job-level
  # `environment:` key can't read the workflow `env` context directly.
  resolve-config:
    runs-on: ubuntu-latest
    outputs:
      dev_environment: ${{ steps.vars.outputs.dev_environment }}
      test_environment: ${{ steps.vars.outputs.test_environment }}
      prod_environment: ${{ steps.vars.outputs.prod_environment }}
    steps:
      - id: vars
        run: |
          echo "dev_environment=$DEV_ENVIRONMENT" >> "$GITHUB_OUTPUT"
          echo "test_environment=$TEST_ENVIRONMENT" >> "$GITHUB_OUTPUT"
          echo "prod_environment=$PROD_ENVIRONMENT" >> "$GITHUB_OUTPUT"

  # Pick the model package ARN once and stage its artifact into test/prod.
  prepare:
    name: Select & stage model
    needs: [resolve-config]
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-config.outputs.dev_environment }}
    outputs:
      model_package_arn: ${{ steps.pick.outputs.arn }}
      model_package_version: ${{ steps.pick.outputs.version }}
      staged_url_test: ${{ steps.stage-test.outputs.staged_url }}
      staged_url_prod: ${{ steps.stage-prod.outputs.staged_url }}
      start_at: ${{ steps.params.outputs.start_at }}
      run_smoke_test: ${{ steps.params.outputs.run_smoke_test }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Resolve trigger params
        id: params
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          CLIENT_PAYLOAD_ARN: ${{ github.event.client_payload.model_package_arn }}
          INPUT_START_AT: ${{ inputs.start_at }}
          INPUT_MODEL_PACKAGE_ARN: ${{ inputs.model_package_arn }}
          INPUT_RUN_SMOKE_TEST: ${{ inputs.run_smoke_test }}
        run: |
          if [ "$EVENT_NAME" = "repository_dispatch" ]; then
            START="dev"
            ARN_OVERRIDE="$CLIENT_PAYLOAD_ARN"
            SMOKE="true"
          else
            START="$INPUT_START_AT"
            ARN_OVERRIDE="$INPUT_MODEL_PACKAGE_ARN"
            SMOKE="$INPUT_RUN_SMOKE_TEST"
          fi
          {
            echo "start_at=$START"
            echo "run_smoke_test=$SMOKE"
            echo "model_package_arn_override=$ARN_OVERRIDE"
          } >> "$GITHUB_OUTPUT"

      - name: Authenticate via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ vars.DOMAIN_REGION || 'us-east-1' }}

      - name: Install CLI
        # aws-smus-cicd-cli is needed so mlops_helper.py can reuse the packaged
        # smus_cicd.helpers.datazone resolution (domain + project lookup).
        run: pip install aws-smus-cicd-cli pyyaml boto3 -q

      - name: Pick model package
        id: pick
        shell: bash
        env:
          PROVIDED_ARN: ${{ steps.params.outputs.model_package_arn_override }}
        run: |
          if [ -n "$PROVIDED_ARN" ]; then
            echo "arn=$PROVIDED_ARN" >> "$GITHUB_OUTPUT"
            VERSION=$(python3 -c "import boto3,os; v=boto3.client('sagemaker', region_name=os.environ['REGION']).describe_model_package(ModelPackageName=os.environ['PROVIDED_ARN']).get('ModelPackageVersion','?'); print(v)")
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          else
            python3 "$MLOPS_HELPER" select-package \
              --group "$MODEL_PACKAGE_GROUP" \
              --region "$REGION"
          fi

      - name: Stage artifact into TEST bucket
        id: stage-test
        if: ${{ steps.params.outputs.start_at != 'prod' }}
        env:
          ARN: ${{ steps.pick.outputs.arn }}
        run: |
          python3 "$MLOPS_HELPER" stage-artifact \
            --model-package-arn "$ARN" \
            --domain-tags "purpose=${DOMAIN_TAG_PURPOSE:-smus-cicd-testing}" \
            --target-project-name "$TEST_PROJECT_NAME" \
            --region "$REGION"

      - name: Stage artifact into PROD bucket
        id: stage-prod
        env:
          ARN: ${{ steps.pick.outputs.arn }}
        run: |
          python3 "$MLOPS_HELPER" stage-artifact \
            --model-package-arn "$ARN" \
            --domain-tags "purpose=${DOMAIN_TAG_PURPOSE:-smus-cicd-testing}" \
            --target-project-name "$PROD_PROJECT_NAME" \
            --region "$REGION"

      - name: Summary
        env:
          ARN: ${{ steps.pick.outputs.arn }}
          VERSION: ${{ steps.pick.outputs.version }}
          STAGED_TEST: ${{ steps.stage-test.outputs.staged_url || 'n/a' }}
          STAGED_PROD: ${{ steps.stage-prod.outputs.staged_url || 'n/a' }}
        run: |
          {
            echo "### 📦 Model package selected"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| ARN     | \`$ARN\` |"
            echo "| Version | $VERSION |"
            echo "| Staged (test) | \`$STAGED_TEST\` |"
            echo "| Staged (prod) | \`$STAGED_PROD\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-dev:
    name: Deploy to DEV
    needs: [resolve-config, prepare]
    if: ${{ needs.prepare.outputs.start_at == 'dev' && needs.prepare.result == 'success' }}
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-config.outputs.dev_environment }}
    env:
      STAGE: dev
      ENDPOINT_NAME: bank-mktg-prediction-dev
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Authenticate via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ vars.DOMAIN_REGION || 'us-east-1' }}

      - name: Install CLI
        run: pip install aws-smus-cicd-cli pyyaml boto3 -q

      - name: Export workflow env for manifest substitution
        env:
          PREPARE_MODEL_PACKAGE_ARN: ${{ needs.prepare.outputs.model_package_arn }}
        run: |
          {
            echo "GIT_COMMIT=$GITHUB_SHA"
            echo "MODEL_PACKAGE_ARN=$PREPARE_MODEL_PACKAGE_ARN"
            echo "MODEL_DATA_URL_OVERRIDE=none"
          } >> "$GITHUB_ENV"

      - name: Validate target (describe --connect)
        working-directory: ${{ env.MANIFEST_DIR }}
        run: aws-smus-cicd-cli describe --manifest manifest.yaml --targets "$STAGE" --connect

      - name: Push DAG + src/ to project (deploy)
        working-directory: ${{ env.MANIFEST_DIR }}
        run: aws-smus-cicd-cli deploy --manifest manifest.yaml --targets "$STAGE"

      - name: Run deploy_pipeline DAG
        working-directory: ${{ env.MANIFEST_DIR }}
        run: |
          aws-smus-cicd-cli run --manifest manifest.yaml --targets "$STAGE" --workflow "$WORKFLOW_NAME"
          aws-smus-cicd-cli monitor --manifest manifest.yaml --targets "$STAGE" --live

      - name: Verify deploy processing job succeeded
        run: |
          python3 "$MLOPS_HELPER" check-deploy-status \
            --region "$REGION" \
            --max-age-minutes 60

      - name: Smoke test endpoint
        if: ${{ needs.prepare.outputs.run_smoke_test == 'true' }}
        run: |
          python3 "$MLOPS_HELPER" smoke-test \
            --endpoint-name "$ENDPOINT_NAME" \
            --region "$REGION"

      - name: Record deploy on model package metadata
        if: ${{ needs.prepare.outputs.run_smoke_test == 'true' }}
        shell: bash
        env:
          MODEL_PKG_ARN: ${{ needs.prepare.outputs.model_package_arn }}
        run: |
          ARN="$MODEL_PKG_ARN"
          aws sagemaker describe-model-package --model-package-name "$ARN" \
            --query 'CustomerMetadataProperties' --output json > /tmp/props.json || echo '{}' > /tmp/props.json
          jq --arg ts "$(date -u +%FT%TZ)" \
             '. + {last_deployed_stage: "dev", deployed_to_dev_at: $ts}' \
             /tmp/props.json > /tmp/props-merged.json
          aws sagemaker update-model-package \
            --model-package-arn "$ARN" \
            --customer-metadata-properties "file:///tmp/props-merged.json"

      - name: Capture deploy logs for postmortem
        if: ${{ always() }}
        continue-on-error: true
        run: |
          python3 "$MLOPS_HELPER" capture-deploy-logs \
            --region "$REGION" \
            --output-dir "$RUNNER_TEMP/deploy-logs-dev"

      - name: Upload deploy logs artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: deploy-logs-dev-${{ github.run_id }}
          path: ${{ runner.temp }}/deploy-logs-dev/**
          if-no-files-found: ignore
          retention-days: 14

  approve-test:
    name: Approve TEST deployment
    needs: [prepare, deploy-dev]
    if: |
      always() &&
      needs.prepare.result == 'success' &&
      (
        (needs.prepare.outputs.start_at == 'dev' && needs.deploy-dev.result == 'success') ||
        needs.prepare.outputs.start_at == 'test'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Only users with write/triage access (who can manage and close issues)
      # may approve. Read-only users and non-collaborators are rejected by the
      # script. Uses only issues: write.
      - name: Await approval (repo write access required)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          STAGE: TEST
          MODEL_ARN: ${{ needs.prepare.outputs.model_package_arn }}
          MODEL_VER: ${{ needs.prepare.outputs.model_package_version }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash examples/end-to-end-data-ml-pipeline/scripts/await_issue_approval.sh

  deploy-test:
    name: Deploy to TEST
    needs: [resolve-config, prepare, deploy-dev, approve-test]
    if: |
      always() &&
      needs.prepare.result == 'success' &&
      needs.approve-test.result == 'success' &&
      (
        (needs.prepare.outputs.start_at == 'dev' && needs.deploy-dev.result == 'success') ||
        needs.prepare.outputs.start_at == 'test'
      )
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-config.outputs.test_environment }}
    env:
      STAGE: test
      ENDPOINT_NAME: bank-mktg-prediction-test
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Authenticate via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ vars.DOMAIN_REGION || 'us-east-1' }}

      - name: Install CLI
        run: pip install aws-smus-cicd-cli pyyaml boto3 -q

      - name: Export workflow env for manifest substitution
        env:
          STAGED_URL_TEST: ${{ needs.prepare.outputs.staged_url_test }}
          PREPARE_MODEL_PACKAGE_ARN: ${{ needs.prepare.outputs.model_package_arn }}
        run: |
          OVERRIDE="$STAGED_URL_TEST"
          if [ -z "$OVERRIDE" ]; then
            echo "::error::staged_url_test missing from prepare outputs"
            exit 1
          fi
          {
            echo "GIT_COMMIT=$GITHUB_SHA"
            echo "MODEL_PACKAGE_ARN=$PREPARE_MODEL_PACKAGE_ARN"
            echo "MODEL_DATA_URL_OVERRIDE=$OVERRIDE"
          } >> "$GITHUB_ENV"

      - name: Validate target (describe --connect)
        working-directory: ${{ env.MANIFEST_DIR }}
        run: aws-smus-cicd-cli describe --manifest manifest.yaml --targets "$STAGE" --connect

      - name: Push DAG + src/ to project (deploy)
        working-directory: ${{ env.MANIFEST_DIR }}
        run: aws-smus-cicd-cli deploy --manifest manifest.yaml --targets "$STAGE"

      - name: Run deploy_pipeline DAG
        working-directory: ${{ env.MANIFEST_DIR }}
        run: |
          aws-smus-cicd-cli run --manifest manifest.yaml --targets "$STAGE" --workflow "$WORKFLOW_NAME"
          aws-smus-cicd-cli monitor --manifest manifest.yaml --targets "$STAGE" --live

      - name: Verify deploy processing job succeeded
        run: |
          python3 "$MLOPS_HELPER" check-deploy-status \
            --region "$REGION" \
            --max-age-minutes 60

      - name: Smoke test endpoint
        if: ${{ needs.prepare.outputs.run_smoke_test == 'true' }}
        run: |
          python3 "$MLOPS_HELPER" smoke-test \
            --endpoint-name "$ENDPOINT_NAME" \
            --region "$REGION"

      - name: Record deploy on model package metadata
        if: ${{ needs.prepare.outputs.run_smoke_test == 'true' }}
        shell: bash
        env:
          MODEL_PKG_ARN: ${{ needs.prepare.outputs.model_package_arn }}
        run: |
          ARN="$MODEL_PKG_ARN"
          aws sagemaker describe-model-package --model-package-name "$ARN" \
            --query 'CustomerMetadataProperties' --output json > /tmp/props.json || echo '{}' > /tmp/props.json
          jq --arg ts "$(date -u +%FT%TZ)" \
             '. + {last_deployed_stage: "test", deployed_to_test_at: $ts}' \
             /tmp/props.json > /tmp/props-merged.json
          aws sagemaker update-model-package \
            --model-package-arn "$ARN" \
            --customer-metadata-properties "file:///tmp/props-merged.json"

      - name: Capture deploy logs for postmortem
        if: ${{ always() }}
        continue-on-error: true
        run: |
          python3 "$MLOPS_HELPER" capture-deploy-logs \
            --region "$REGION" \
            --output-dir "$RUNNER_TEMP/deploy-logs-test"

      - name: Upload deploy logs artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: deploy-logs-test-${{ github.run_id }}
          path: ${{ runner.temp }}/deploy-logs-test/**
          if-no-files-found: ignore
          retention-days: 14

  approve-prod:
    name: Approve PROD deployment
    needs: [prepare, deploy-test]
    if: |
      always() &&
      needs.prepare.result == 'success' &&
      (
        ((needs.prepare.outputs.start_at == 'dev' || needs.prepare.outputs.start_at == 'test') && needs.deploy-test.result == 'success') ||
        needs.prepare.outputs.start_at == 'prod'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Only users with write/triage access (who can manage and close issues)
      # may approve. Read-only users and non-collaborators are rejected by the
      # script. Uses only issues: write.
      - name: Await approval (repo write access required)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          STAGE: PROD
          MODEL_ARN: ${{ needs.prepare.outputs.model_package_arn }}
          MODEL_VER: ${{ needs.prepare.outputs.model_package_version }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash examples/end-to-end-data-ml-pipeline/scripts/await_issue_approval.sh

  deploy-prod:
    name: Deploy to PROD
    needs: [resolve-config, prepare, deploy-test, approve-prod]
    if: |
      always() &&
      needs.prepare.result == 'success' &&
      needs.approve-prod.result == 'success' &&
      (
        ((needs.prepare.outputs.start_at == 'dev' || needs.prepare.outputs.start_at == 'test') && needs.deploy-test.result == 'success') ||
        needs.prepare.outputs.start_at == 'prod'
      )
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-config.outputs.prod_environment }}
    env:
      STAGE: prod
      ENDPOINT_NAME: bank-mktg-prediction-prod
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Authenticate via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ vars.DOMAIN_REGION || 'us-east-1' }}

      - name: Install CLI
        run: pip install aws-smus-cicd-cli pyyaml boto3 -q

      - name: Export workflow env for manifest substitution
        env:
          STAGED_URL_PROD: ${{ needs.prepare.outputs.staged_url_prod }}
          PREPARE_MODEL_PACKAGE_ARN: ${{ needs.prepare.outputs.model_package_arn }}
        run: |
          OVERRIDE="$STAGED_URL_PROD"
          if [ -z "$OVERRIDE" ]; then
            echo "::error::staged_url_prod missing from prepare outputs"
            exit 1
          fi
          {
            echo "GIT_COMMIT=$GITHUB_SHA"
            echo "MODEL_PACKAGE_ARN=$PREPARE_MODEL_PACKAGE_ARN"
            echo "MODEL_DATA_URL_OVERRIDE=$OVERRIDE"
          } >> "$GITHUB_ENV"

      - name: Validate target (describe --connect)
        working-directory: ${{ env.MANIFEST_DIR }}
        run: aws-smus-cicd-cli describe --manifest manifest.yaml --targets "$STAGE" --connect

      - name: Push DAG + src/ to project (deploy)
        working-directory: ${{ env.MANIFEST_DIR }}
        run: aws-smus-cicd-cli deploy --manifest manifest.yaml --targets "$STAGE"

      - name: Run deploy_pipeline DAG
        working-directory: ${{ env.MANIFEST_DIR }}
        run: |
          aws-smus-cicd-cli run --manifest manifest.yaml --targets "$STAGE" --workflow "$WORKFLOW_NAME"
          aws-smus-cicd-cli monitor --manifest manifest.yaml --targets "$STAGE" --live

      - name: Verify deploy processing job succeeded
        run: |
          python3 "$MLOPS_HELPER" check-deploy-status \
            --region "$REGION" \
            --max-age-minutes 60

      - name: Smoke test endpoint
        if: ${{ needs.prepare.outputs.run_smoke_test == 'true' }}
        run: |
          python3 "$MLOPS_HELPER" smoke-test \
            --endpoint-name "$ENDPOINT_NAME" \
            --region "$REGION"

      - name: Record deploy on model package metadata
        if: ${{ needs.prepare.outputs.run_smoke_test == 'true' }}
        shell: bash
        env:
          MODEL_PKG_ARN: ${{ needs.prepare.outputs.model_package_arn }}
        run: |
          ARN="$MODEL_PKG_ARN"
          aws sagemaker describe-model-package --model-package-name "$ARN" \
            --query 'CustomerMetadataProperties' --output json > /tmp/props.json || echo '{}' > /tmp/props.json
          jq --arg ts "$(date -u +%FT%TZ)" \
             '. + {last_deployed_stage: "prod", deployed_to_prod_at: $ts}' \
             /tmp/props.json > /tmp/props-merged.json
          aws sagemaker update-model-package \
            --model-package-arn "$ARN" \
            --customer-metadata-properties "file:///tmp/props-merged.json"

      - name: Capture deploy logs for postmortem
        if: ${{ always() }}
        continue-on-error: true
        run: |
          python3 "$MLOPS_HELPER" capture-deploy-logs \
            --region "$REGION" \
            --output-dir "$RUNNER_TEMP/deploy-logs-prod"

      - name: Upload deploy logs artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: deploy-logs-prod-${{ github.run_id }}
          path: ${{ runner.temp }}/deploy-logs-prod/**
          if-no-files-found: ignore
          retention-days: 14
