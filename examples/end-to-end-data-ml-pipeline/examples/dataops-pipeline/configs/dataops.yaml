# =============================================================================
# DataOps Pipeline - Environment Configuration
# =============================================================================
# Used by: python3 scripts/load_env.py dataops
# Exports environment variables needed by the manifest (per stage).
#
# Variable mapping (YAML key → env var):
#   dev.domain_name → DEV_DOMAIN_NAME
#   dev.region      → DEV_REGION
#   dev.project_name → DEV_PROJECT_NAME
#   dev.deployment_role → DEV_PROJECT_ROLE (exported as PROJECT_ROLE)
#   dev.account_id  → DEV_ACCOUNT_ID (exported as AWS_ACCOUNT_ID)
# =============================================================================

dev:
  domain_name: Default_02202026_Domain
  region: us-east-1
  project_name: ml-dev
  deployment_role: Admin-SMUSCLI
  account_id: "688930149168"

