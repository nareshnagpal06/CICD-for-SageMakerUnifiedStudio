# =============================================================================
# MLOps Pipeline - SageMaker Airflow Operators
# =============================================================================
# End-to-end ML pipeline using SageMaker Airflow Airflow operators:
#   SageMakerTrainingOperator, SageMakerModelOperator,
#   SageMakerTransformOperator, SageMakerEndpointOperator
#
# Project layout:
#   src/           - Training script, feature engineering (Glue), notebooks
#   workflows/     - Airflow DAG YAML definitions
#   data/          - Sample data
#
# Lifecycle:
#   aws-smus-cicd-cli describe --manifest manifest.yaml --connect
#   aws-smus-cicd-cli bundle  --manifest manifest.yaml --output-dir ./dist
#   aws-smus-cicd-cli deploy  --manifest manifest.yaml --targets dev
# =============================================================================

applicationName: demo

content:
  storage:
    - name: src
      include:
        - "src/"
      exclude:
        - __pycache__/
        - "*.pyc"

    - name: workflows
      include:
        - "workflows/"

    - name: notebooks
      include:
        - "src/notebooks/"

    - name: data
      include:
        - "data/"

  workflows:
    - workflowName: training_pipeline
      connectionName: default.workflow_serverless
    - workflowName: deploy_pipeline
      connectionName: default.workflow_serverless

stages:
  dev:
    stage: DEV
    domain:
      name: "${DEV_DOMAIN_NAME}"
      region: "${DEV_REGION}"
    project:
      name: "${DEV_PROJECT_NAME}"
      create: false
    environment_variables:
      ATHENA_DB_NAME: bank_mktg_dev
      ACCOUNT_ID: "${AWS_ACCOUNT_ID}"
      PROJECT_ROLE: "${PROJECT_ROLE}"
      PROJECT_ROLE_ARN: "arn:aws:iam::${AWS_ACCOUNT_ID}:role/${PROJECT_ROLE}"
      EXPERIMENT_NAME: bank-mktg-experiments
      ENDPOINT_NAME: bank-mktg-prediction-dev
      MLFLOW_TRACKING_SERVER_NAME: "${DEV_PROJECT_NAME}"
      MLFLOW_TRACKING_SERVER_ARN: "arn:aws:sagemaker:${DEV_REGION}:${AWS_ACCOUNT_ID}:mlflow-tracking-server/${DEV_PROJECT_NAME}"
    bootstrap:
      actions:
        - type: datazone.create_environment
          environmentConfigurationName: "OnDemand Workflows"
        - type: datazone.create_connection
          name: mlflow-tracking
          connection_type: MLFLOW
          properties:
            trackingServerArn: "arn:aws:sagemaker:${DEV_REGION}:${AWS_ACCOUNT_ID}:mlflow-tracking-server/${DEV_PROJECT_NAME}"
            trackingServerName: "${DEV_PROJECT_NAME}"
        - type: workflow.create
          workflowName: training_pipeline
        - type: workflow.create
          workflowName: deploy_pipeline
    deployment_configuration:
      storage:
        - name: src
          connectionName: default.s3_shared
          targetDirectory: bank-mktg/mlops_pipeline/src
        - name: workflows
          connectionName: default.s3_shared
          targetDirectory: bank-mktg/mlops_pipeline/workflows
        - name: data
          connectionName: default.s3_shared
          targetDirectory: bank-mktg/mlops_pipeline/data

