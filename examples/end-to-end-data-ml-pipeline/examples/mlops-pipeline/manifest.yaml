# =============================================================================
# MLOps Pipeline - SageMaker Airflow Operators
# =============================================================================
# End-to-end ML pipeline using SageMaker Airflow operators:
#   SageMakerTrainingOperator, SageMakerModelOperator,
#   SageMakerTransformOperator, SageMakerEndpointOperator
#
# Project layout:
#   src/           - Training script, feature engineering (Glue), notebooks
#   workflows/     - Airflow DAG YAML definitions
#   data/          - Sample data
#
# Lifecycle:
#   aws-smus-cicd-cli describe --manifest manifest.yaml --connect
#   aws-smus-cicd-cli bundle  --manifest manifest.yaml --output-dir ./dist
#   aws-smus-cicd-cli deploy  --manifest manifest.yaml --targets dev
# =============================================================================

applicationName: demo

content:
  storage:
    - name: src
      include:
        - "src/"
      exclude:
        - __pycache__/
        - "*.pyc"

    - name: workflows
      include:
        - "workflows/"

    - name: notebooks
      include:
        - "src/notebooks/"

  workflows:
    - workflowName: training_pipeline
      connectionName: default.workflow_serverless
    - workflowName: deploy_pipeline
      connectionName: default.workflow_serverless

stages:
  dev:
    stage: DEV
    domain:
      tags:
        purpose: ${DOMAIN_TAG_PURPOSE:smus-cicd-testing}
      region: ${DEV_DOMAIN_REGION}
    project:
      name: ${DEV_PROJECT_NAME:dev-marketing}
      owners:
        - arn:aws:iam::${AWS_ACCOUNT_ID}:role/GitHubActionsRole-SMUS-CLI-Tests
    environment_variables:
      ATHENA_DB_NAME: bank_mktg_dev
      EXPERIMENT_NAME: bank-mktg-experiments
      ENDPOINT_NAME: bank-mktg-prediction-dev
      MLFLOW_TRACKING_SERVER_NAME: "${MLFLOW_TRACKING_SERVER_NAME}"
      MLFLOW_TRACKING_SERVER_ARN: "${MLFLOW_TRACKING_SERVER_ARN}"
      MODEL_PACKAGE_ARN: "${MODEL_PACKAGE_ARN:none}"
      MODEL_DATA_URL_OVERRIDE: "${MODEL_DATA_URL_OVERRIDE:none}"
      GIT_COMMIT: "${GIT_COMMIT:unset}"
    bootstrap:
      actions:
        - type: datazone.create_environment
          environmentConfigurationName: "OnDemand Workflows"
        - type: datazone.create_connection
          name: mlflow-tracking
          connection_type: MLFLOW
          properties:
            trackingServerArn: "${MLFLOW_TRACKING_SERVER_ARN}"
            trackingServerName: "${MLFLOW_TRACKING_SERVER_NAME}"
        - type: workflow.create
          workflowName: training_pipeline
        - type: workflow.create
          workflowName: deploy_pipeline
    deployment_configuration:
      storage:
        - name: src
          connectionName: default.s3_shared
          targetDirectory: bank-mktg/mlops_pipeline/src
        - name: workflows
          connectionName: default.s3_shared
          targetDirectory: bank-mktg/mlops_pipeline/workflows

  test:
    stage: TEST
    domain:
      tags:
        purpose: ${DOMAIN_TAG_PURPOSE:smus-cicd-testing}
      region: ${TEST_DOMAIN_REGION}
    project:
      name: ${TEST_PROJECT_NAME:test-marketing}
    environment_variables:
      ATHENA_DB_NAME: bank_mktg_test
      EXPERIMENT_NAME: bank-mktg-experiments
      ENDPOINT_NAME: bank-mktg-prediction-test
      MLFLOW_TRACKING_SERVER_NAME: "${MLFLOW_TRACKING_SERVER_NAME}"
      MLFLOW_TRACKING_SERVER_ARN: "${MLFLOW_TRACKING_SERVER_ARN}"
      MODEL_PACKAGE_ARN: "${MODEL_PACKAGE_ARN:none}"
      MODEL_DATA_URL_OVERRIDE: "${MODEL_DATA_URL_OVERRIDE:none}"
      GIT_COMMIT: "${GIT_COMMIT:unset}"
    bootstrap:
      actions:
        - type: datazone.create_environment
          environmentConfigurationName: "OnDemand Workflows"
        - type: datazone.create_connection
          name: mlflow-tracking
          connection_type: MLFLOW
          properties:
            trackingServerArn: "${MLFLOW_TRACKING_SERVER_ARN}"
            trackingServerName: "${MLFLOW_TRACKING_SERVER_NAME}"
        - type: workflow.create
          workflowName: deploy_pipeline
    deployment_configuration:
      storage:
        - name: src
          connectionName: default.s3_shared
          targetDirectory: bank-mktg/mlops_pipeline/src
        - name: workflows
          connectionName: default.s3_shared
          targetDirectory: bank-mktg/mlops_pipeline/workflows

  prod:
    stage: PROD
    domain:
      tags:
        purpose: ${DOMAIN_TAG_PURPOSE:smus-cicd-production}
      region: ${PROD_DOMAIN_REGION}
    project:
      name: ${PROD_PROJECT_NAME:prod-marketing}
    environment_variables:
      ATHENA_DB_NAME: bank_mktg_prod
      EXPERIMENT_NAME: bank-mktg-experiments
      ENDPOINT_NAME: bank-mktg-prediction-prod
      MLFLOW_TRACKING_SERVER_NAME: "${MLFLOW_TRACKING_SERVER_NAME}"
      MLFLOW_TRACKING_SERVER_ARN: "${MLFLOW_TRACKING_SERVER_ARN}"
      MODEL_PACKAGE_ARN: "${MODEL_PACKAGE_ARN:none}"
      MODEL_DATA_URL_OVERRIDE: "${MODEL_DATA_URL_OVERRIDE:none}"
      GIT_COMMIT: "${GIT_COMMIT:unset}"
    bootstrap:
      actions:
        - type: datazone.create_environment
          environmentConfigurationName: "OnDemand Workflows"
        - type: datazone.create_connection
          name: mlflow-tracking
          connection_type: MLFLOW
          properties:
            trackingServerArn: "${MLFLOW_TRACKING_SERVER_ARN}"
            trackingServerName: "${MLFLOW_TRACKING_SERVER_NAME}"
        - type: workflow.create
          workflowName: deploy_pipeline
    deployment_configuration:
      storage:
        - name: src
          connectionName: default.s3_shared
          targetDirectory: bank-mktg/mlops_pipeline/src
        - name: workflows
          connectionName: default.s3_shared
          targetDirectory: bank-mktg/mlops_pipeline/workflows
